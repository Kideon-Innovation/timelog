<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="TimeLog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1e29"/>
      <stop offset="1" stop-color="#0b0c0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffb224" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ffb224" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="190" fill="url(#glow)"/>
  <!-- progress ring: open gap at top, ~75% sweep -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#2c2a24" stroke-width="30"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffb224" stroke-width="30"
          stroke-linecap="round" stroke-dasharray="707 943" stroke-dashoffset="0"
          transform="rotate(-90 256 256)"/>
  <!-- center glowing dot -->
  <circle cx="256" cy="256" r="62" fill="#ffb224" filter="url(#soft)" opacity=".7"/>
  <circle cx="256" cy="256" r="50" fill="#ffce6a"/>
  <circle cx="256" cy="256" r="50" fill="none" stroke="#ffb224" stroke-width="3"/>
</svg>
