name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      PORT: 47811
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Playwright test runner is not a project dependency (browsers are cached
      # globally on dev machines). In CI we install it ad-hoc, pinned, plus
      # Chromium with its system deps.
      - name: Install Playwright (pinned) + Chromium
        run: |
          npm i --no-save @playwright/test@1.58.2
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
