name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

# Read-only; this job only builds and runs tests, it does not deploy.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Playwright is NOT a project dependency (it's used globally in dev). Pin
      # the exact version the specs were written against and fetch its Chromium.
      - name: Install Playwright (1.58.2) + Chromium
        run: |
          npm install --no-save @playwright/test@1.58.2
          npx playwright install --with-deps chromium

      - name: Build (Vite + vite-plugin-pwa)
        run: npm run build

      - name: Unit tests (pure helpers)
        run: npm run test:unit

      - name: E2E tests (Playwright)
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
